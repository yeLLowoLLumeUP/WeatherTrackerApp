name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🛠 Fix app.json & Create Assets (The Expert Way)
        run: |
          # 1. Klasör yapısını garantiye al
          mkdir -p assets/images
          
          # 2. Hata veren tüm görseller için 1x1 piksellik gerçek birer PNG üretelim.
          # Sadece 'touch' bazen yetmeyebiliyor, içi dolu dosya bekleyebilir.
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 -d > assets/images/icon.png
          cp assets/images/icon.png assets/images/android-icon-foreground.png
          cp assets/images/icon.png assets/images/android-icon-background.png
          cp assets/images/icon.png assets/images/android-icon-monochrome.png
          cp assets/images/icon.png assets/images/favicon.png
          cp assets/images/icon.png assets/images/splash-icon.png
          
          # 3. app.json dosyasını 'jq' ile profesyonelce temizle (ikon zorunluluğunu kaldır)
          # Eğer jq yoksa standart sed komutuyla devam et
          sed -i 's/"icon":[^,]*,"/"icon": "" ,/g' app.json
          sed -i 's/"foregroundImage":[^,]*,"/"foregroundImage": "" ,/g' app.json
          
          echo "Assetler ve konfigürasyon hazırlandı."

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest

      - name: 🛠 Build Android Project (Prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔨 Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WeatherApp-Expert-Build
          path: android/app/build/outputs/apk/debug/*.apk
