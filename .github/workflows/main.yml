name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🖼️ Create Missing Assets (Force Fix)
        run: |
          # Klasörleri oluştur
          mkdir -p assets/images
          
          # Expo'nun hata verdiği tüm dosyaları sahte (boş) görsellerle doldur
          # Bu komutlar hata almanı engelleyecek
          touch assets/images/icon.png
          touch assets/images/android-icon-foreground.png
          touch assets/images/android-icon-background.png
          touch assets/images/android-icon-monochrome.png
          touch assets/images/favicon.png
          touch assets/images/splash-icon.png
          
          # Dosyaların oluştuğunu doğrula (loglarda görmek için)
          ls -R assets/images

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest

      - name: 🛠 Build Android Project (Prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔨 Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WeatherApp-Offline-APK
          path: android/app/build/outputs/apk/debug/*.apk
